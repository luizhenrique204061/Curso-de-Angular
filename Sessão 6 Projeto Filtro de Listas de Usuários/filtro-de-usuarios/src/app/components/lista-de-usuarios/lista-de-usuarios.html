<div class="lista_de_usuarios">
    <table mat-table [dataSource]="dadosUsuarios" >

        <!-- Coluna Nome -->
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let element" class="lista_de_usuarios__item" (click)="usuarioSelecionado(element)" > {{ element.nome }} </td>
        </ng-container>

        <!-- Coluna Data de Cadastro -->
        <ng-container matColumnDef="dataCadastro">
            <th mat-header-cell *matHeaderCellDef> Data de Cadastro </th>
            <!-- O date pipe formata a string ISO para DD/MM/AAAA -->
            <td mat-cell *matCellDef="let element" class="lista_de_usuarios__item" (click)="usuarioSelecionado(element)"> {{ element.dataCadastro | date:'dd/MM/yyyy' }} </td>
        </ng-container>

        <!-- Coluna Status -->
        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <!-- Exibe 'Ativo' ou 'Inativo' com base no booleano 'ativo' do objeto Usuario -->
            <td mat-cell *matCellDef="let element" class="lista_de_usuarios__item" (click)="usuarioSelecionado(element)"> {{ element.ativo ? 'Ativo' : 'Inativo' }} </td>
        </ng-container>

        <!-- Cabeçalho (renderiza as colunas definidas no .ts) -->
        <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>

        <!-- Linha de Dados (itera por cada item do dataSource) -->
        <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>

    </table>
</div>
