<cdk-virtual-scroll-viewport itemSize="90" class="lista">
  <app-pessoa 
    *cdkVirtualFor="let pessoas of listaPessoas; let i = index; let isImpar = odd"
    [nomeDaPessoa]="pessoas.nome"
    [idadeDaPessoa]="pessoas.idade"
    [pessoaIndice]="i"
    [isImpar]="isImpar"
    [isSelecionado]="indiceDaPessoaSelecionada === i"
    (pessoaSelecionadaEmit)="selecionarPessoa($event)">
  </app-pessoa>
</cdk-virtual-scroll-viewport>
