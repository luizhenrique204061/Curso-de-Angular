<input id="meu-id" type="text" [value]="inputText" [type]="inputType" [disabled]="isDesativado" (keyup)="handleInputKeyUp($event)" (input)="handleInputEvent($event)">
<br>

<button (click)="ativarInput()">Habilitar</button>
<button (click)="desativarInput()">Desabilitar</button>
<br>

<button (click)="inserirSenha()">Senha</button>
<button (click)="inserirTexto()">Texto</button>
<br>

<button (click)="logInputText()">Log</button>
