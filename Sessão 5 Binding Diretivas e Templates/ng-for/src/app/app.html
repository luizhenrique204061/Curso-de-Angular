<div class="lista">
  <app-pessoa 
    *ngFor="let pessoas of listaPessoas; let i = index; let isImpar = odd"
    [nomeDaPessoa]="pessoas.nome"
    [idadeDaPessoa]="pessoas.idade"
    [pessoaIndice]="i"
    [isImpar]="isImpar"
    [isSelecionado]="indiceDaPessoaSelecionada === i"
    (pessoaSelecionadaEmit)="selecionarPessoa($event)"> </app-pessoa>
</div>
